  .exec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.drv'...\nbuilding '/nix/store/sqgs027yinv2s57s68bcz1wabxizhxks-logos-capability_module-module-lib-lgx-1.0.0.drv'...\nbuilding '/nix/store/r4k30avabh9b72k0b3yid71hpl3q08r5-logos-capability_module-module-lib-install.drv'...\nbuilding '/nix/store/g61z7gn3fvw8r88dck95v0rpxckqsr7q-logos-logoscore-cli-modules-0.1.0.drv'...\nbuilding '/nix/store/cd5z9m3cg6jkilrndkjp0brfh3rr8b1h-logos-module-client-lib-0.1.0.drv'...\nbuilding '/nix/store/ysg0wyxaylfpynajx3a11ma4knrn0nws-logos-module-client.drv'...\nbuilding '/nix/store/2vahlbr09ncn8m1jq2kmwaa71n7bmk20-logos-liblogos-lib-0.1.0.drv'...\nbuilding '/nix/store/4jsrizik482xdsqg4s6h0s0lz1x4ml66-logos-liblogos-bin-0.1.0.drv'...\nbuilding '/nix/store/xg27xd7d3m0vp3bmfl9p73yd8p8n9956-logos-liblogos.drv'...\nbuilding '/nix/store/n9867z2pm9byyi3zva4lz3lzw2nqfrja-logos-logoscore-cli-0.1.0.drv'...\nbuilding '/nix/store/qy73szin7m8239f7gbncffvysc4icbh1-logos-logoscore-cli-bin-0.1.0.drv'...\nbuilding '/nix/store/59jaah3qcvmm7cl0wlqywv4c8bk6wz70-logos-logoscore-cli.drv'...\n", "note": ""}]}, {"md": "## Step 2: Build the lgpm package manager\n\n`lgpm` installs `.lgx` packages into a modules directory and scans what is\ninstalled. Build it from the `logos-package-manager` flake and link it as\n`./lgpm`. (`lgpm` is plain C++ with no SDK dependency, so it needs no\noverride.)", "execs": []}, {"md": "### 2.1 Build lgpm\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' -o lgpm\n```\n\nThe executable is at `./lgpm/bin/lgpm`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-package-manager/2b4b72087154dd4d6f691ac2527e06e0dadaef4d' into the Git cache...\nthis path will be fetched (265.9 KiB download, 930.0 KiB unpacked):\n  /nix/store/lbwwpb0r3qcsqjcpfqy9fjs1njwjcnav-logos-package-manager-cli-1.0.0\ncopying path '/nix/store/lbwwpb0r3qcsqjcpfqy9fjs1njwjcnav-logos-package-manager-cli-1.0.0' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "## Step 3: Build and install the accounts module against this SDK\n\nClone [`logos-accounts-module`](https://github.com/logos-co/logos-accounts-module),\nbuild its `.lgx` straight from its flake's `#lgx` output **against the SDK\ncommit under test**, and install it into a local `./modules` directory with\n`lgpm`. Building the module against the same SDK as the runtime keeps the\nplugin ABI-compatible with the host that will load it. Every module built\nwith [`logos-module-builder`](https://github.com/logos-co/logos-module-builder)\nexposes a ready-to-install `#lgx`, and the builder owns the module's SDK\npin \u2014 so the override path here is\n`logos-module-builder/logos-cpp-sdk`.", "execs": []}, {"md": "### 3.1 Clone the module\n\nWe clone over HTTPS so the step works in CI; over SSH the URL is\n`git@github.com:logos-co/logos-accounts-module.git`.\n\n```bash\ngit clone --depth 1 https://github.com/logos-co/logos-accounts-module.git\n```", "execs": [{"kind": "run", "cmd": "git clone --depth 1 https://github.com/logos-co/logos-accounts-module.git", "status": "pass", "exit_code": 0, "output": "Cloning into 'logos-accounts-module'...\n", "note": ""}]}, {"md": "### 3.2 Build the module's .lgx against this SDK\n\nBuild the `#lgx` output, overriding the module builder's `logos-cpp-sdk`\nto the commit under test, and link it as `./accounts-lgx`. (This\ncompiles the module and its SDK dependencies through Nix, so the first\nbuild is slow.)\n\n```bash\n# From inside the clone this is simply:\n#   nix build '.#lgx' --override-input logos-module-builder/logos-cpp-sdk 'github:logos-co/logos-cpp-sdk'\nnix build 'path:./logos-accounts-module#lgx' \\\n  --override-input logos-module-builder/logos-cpp-sdk 'github:logos-co/logos-cpp-sdk' \\\n  -o accounts-lgx\n```\n\nThe `.lgx` package is now under `./accounts-lgx/`:\n\n```bash\nls accounts-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "nix build 'path:./logos-accounts-module#lgx' \\\n  --override-input logos-module-builder/logos-cpp-sdk 'github:logos-co/logos-cpp-sdk/99eb4a7dd78f86720f48f7e6954d779f2267fca9' \\\n  -o accounts-lgx\n", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-module-builder/d3616e8410320a2bddc39e56348c64e7dfffb918?narHash=sha256-VfvZW5efQtgt8QOJhS35btP6beG%2BE/UrnfP9YMRItEw%3D' into the Git cache...\nunpacking 'github:logos-co/logos-module/73cd9c4b2646dedb1b624a3178b32a7af1670047?narHash=sha256-PrVdkHNN2PPXoUEJoJUKv61t6IeQ3iQSRarIpFr9GHE%3D' into the Git cache...\nunpacking 'github:logos-co/logos-plugin-qt/78a04d603d910d864a26b158eca0882321258d44?narHash=sha256-RaJzt4sx6WrLtwhRhkGki/I%2BBvt8fuC%2Bp%2BoCcuLTm3g%3D' into the Git cache...\nunpacking 'github:logos-co/logos-module/337223f2a72710d8052ca750510cd25d33e05047?narHash=sha256-Ugngv17u5CA3lOSNHN6nJ%2B/WpIyNn8yui0M2VDdkENk%3D' into the Git cache...\nunpacking 'github:logos-co/logos-standalone-app/84d24c6a0d5c73bb81160e2a13de9995caa34c0f?narHash=sha256-2zQcNzbO3RnC8zZBB2y1s1ItZNwYzqgJjlevYjzKQHQ%3D' into the Git cache...\nunpacking 'github:logos-co/logos-cpp-sdk/2a21637e0238b4e629f4b707d13f0b803810cc7d?narHash=sha256-XrYR9l3YZSfX/f90Fsedzz3XZufWfP75OaJQnHIH29Q%3D' into the Git cache...\nunpacking 'github:logos-co/logos-design-system/75201e56002327864544b729ad0077bca7e5b03d?narHash=sha256-fXPDvB4VoS9k0oiW3CjN1w2cw9noqcloftXKMc8E0ng%3D' into the Git cache...\nunpacking 'github:logos-co/logos-test-framework/55b15075b5990b3c043030a3e404c7f11d57c32b?narHash=sha256-BnnrAjYJHW994WYAhd6e6/T7igLqJm4utjhqx1a6kLw%3D' into the Git cache...\nunpacking 'github:logos-co/nix-bundle-lgx/9d6f9016c865b9d2793672bc3c45a50b59753c78?narHash=sha256-ku5gG6qKIZeWzJ/jNOxfsx1rwJ3kPrCw8/wnBKq1Uyw%3D' into the Git cache...\nunpacking 'github:logos-co/logos-package/9e3730d5c0e3ec955761c05b50e3a6047ee4030b?narHash=sha256-toDnGXUthRcQm7vcEYzb2bLI7FE1tbfzH8Ie2Cnb9mk%3D' into the Git cache...\nunpacking 'github:logos-co/nix-bundle-dir/cd214dbf15487d80967389847ae2210468be6 accounts_module-module-lib-lgx-1.0.0.drv'...\n", "note": ""}, {"kind": "run", "cmd": "ls accounts-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "accounts-lgx/logos-accounts_module-module-lib.lgx\n", "note": ""}]}, {"md": "### 3.3 Seed the modules directory with the bundled capability module\n\n`accounts_module` is loaded through the host's capability layer, so the\nmodules directory also needs the `capability_module` that ships with\n`logoscore` (and that we just rebuilt against this SDK). Copy it across\nfirst.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.4 Install the .lgx with lgpm\n\nInstall the freshly-built package into `./modules`. `accounts_module` is\na `core` module, so it goes to `--modules-dir`. The package is unsigned\n(a local dev build), so we pass `--allow-unsigned`.\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file accounts-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file accounts-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: accounts-lgx/logos-accounts_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.5 Confirm the install\n\nScan the directory and confirm the module landed:\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 2 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\naccounts_module                1.0.0           core       accounts       \ncapability_module              1.0.0           core       security       \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `accounts_module`, introspect it, and call its methods.\nDaemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-05 21:37:45.673] [info] [capability_module] [LogosProviderObject] LogosAPIProvider: detected LogosProviderPlugin for \"capability_module\"\n[2026-06-05 21:37:45.673] [info] [capability_module] [LogosProviderObject] LogosAPIProvider: registering LogosProviderObject directly for \"capability_module\"\n[2026-06-05 21:37:45.673] [info] [capability_module] [LogosProviderObject] LogosProviderBase::init called\n[2026-06-05 21:37:45.673] [info] [capability_module] [LogosProviderObject] ModuleProxy: created, wrapping LogosProviderObject \"capability_module\"\n[2026-06-05 21:37:45.673] [info] [capability_module] RemoteTransportHost: Created registry host with URL: \"local:logos_capability_module_acac88c84860\"\n[2026-06-05 21:37:45.673] [info] [capability_module] RemoteTransportHost: Published object: \"capability_module\"\n[2026-06-05 21:37:45.673] [info] "},{\"isInvokable\":true,\"name\":\"extKeyToECDSA\",\"parameters\":[{\"name\":\"extKeyStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"extKeyToECDSA(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"ecdsaToPublicKey\",\"parameters\":[{\"name\":\"privateKeyECDSAStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"ecdsaToPublicKey(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"publicKeyToAddress\",\"parameters\":[{\"name\":\"publicKeyStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"publicKeyToAddress(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"createRandomMnemonic\",\"parameters\":[{\"name\":\"length\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"createRandomMnemonic(int)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"createRandomMnemonicWithDefaultLength\",\"returnType\":\"QString\",\"signature\":\"createRandomMnemonicWithDefaultLength()\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"lengthToEntropyStrength\",\"parameters\":[{\"name\":\"length\",\"type\":\"int\"}],\"returnType\":\"int\",\"signature\":\"lengthToEntropyStrength(int)\",\"type\":\"method\"}],\"name\":\"accounts_module\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "### 4.8 Call a method\n\nGenerate a fresh 12-word BIP-39 mnemonic. `createRandomMnemonic` takes\nthe word count and returns the phrase \u2014 a real round-trip dispatched\nover the SDK's IPC layer into the module compiled against this SDK:\n\n```bash\nlogoscore call accounts_module createRandomMnemonic 12\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module createRandomMnemonic 12", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createRandomMnemonic\",\"module\":\"accounts_module\",\"result\":\"sell child rely casual divert solve column grant load equip smile wine\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.9 Call a second method\n\n`lengthToEntropyStrength` maps a mnemonic word count to its entropy\nstrength in bits \u2014 12 words is 128 bits. This exercises an `int`\nround-trip through `LogosResult` over the SDK's IPC:\n\n```bash\nlogoscore call accounts_module lengthToEntropyStrength 12\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module lengthToEntropyStrength 12", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lengthToEntropyStrength\",\"module\":\"accounts_module\",\"result\":128,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.10 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.11 Confirm the daemon has stopped\n\nWith no daemon running, the client reports `not_running` and exits\nnon-zero, so we add `|| true` to let the doc-test assert on the output:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"acac88c84860\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}, {"meta": {"name": "Composing Two Modules Built Against This C++ SDK", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Composing Two Modules Built Against This C++ SDK\n\nThe whole point of `logos-cpp-sdk` is that a module can call **another**\nmodule without ever touching the raw `LogosAPI`: you declare a dependency,\nand the SDK's code generator emits a typed `modules().<dep>` wrapper with\nsynchronous callers, asynchronous callers, and event subscribers. This\ndoc-test proves that cross-module path works end-to-end on the SDK commit\nunder test \u2014 by building *both* sides from scratch against it.\n\nIt is fully self-contained \u2014 no pre-existing module, no `requires:` chain:\n\n1. Create `greeter_module`, a small **callee** with a couple of methods\n   (`greet`, `addInts`, `greetCount`) and a `greeted` event.\n2. Create `orchestrator_module`, a **caller** that declares `greeter_module`\n   as a dependency and composes it through the generated\n   `modules().greeter_module` wrapper \u2014 synchronously, asynchronously, and by\n   subscribing to its event.\n3. Build **both** modules' `.lgx` packages **against the C++ SDK commit under\n   test**, so the generated wrappers, the plugin glue, and the IPC layer all\n   come from this SDK.\n4. Build `logoscore` (also against this SDK), install both modules, load them\n   together, and call the orchestrator's methods \u2014 each of which calls into\n   the greeter across the process boundary.\n\nBecause the caller, the callee, the generated cross-module wrappers, and the\nruntime are all built from the SDK commit under test, a green run is real\nevidence that this change keeps inter-module composition \u2014 the SDK's core\npromise \u2014 working.\n\n**What you'll build:** Two modules \u2014 a `greeter_module` callee and an `orchestrator_module` caller \u2014 built against this SDK commit and run together in `logoscore`, with the caller driving the callee over IPC.\n\n**What you'll learn:**\n\n- How one module declares another as a dependency (`metadata.json` + `flake.nix` input)\n- How the SDK generates a typed `modules().<dep>` wrapper with sync, async, and event APIs\n- How to build a module \u2014 and its module dependency \u2014 against a specific `logos-cpp-sdk` commit\n- How to load two modules in `logoscore` and chain calls so the caller drives the callee\n- How async replies and event subscriptions survive between `call` commands under the daemon\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **git** \u2014 nix flakes only see files tracked by git.\n- A Linux or macOS machine.", "execs": []}, {"md": "## Step 1: Create the callee: greeter_module\n\n`greeter_module` is an ordinary `core` module written in the pure-C++\n(`interface: universal`) style: you write one plain class, and the builder\ngenerates the Qt plugin glue. Every `public` method becomes callable over\nIPC, and the `logos_events:` block declares an event other modules can\nsubscribe to.", "execs": []}, {"md": "### 1.1 metadata.json\n\n`dependencies` is empty \u2014 the greeter calls no one. `interface:\nuniversal` selects the pure-C++ pattern.\n\n```json\n{\n  \"name\": \"greeter_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"category\": \"general\",\n  \"description\": \"A callee module: greets, counts greetings, and emits an event\",\n  \"main\": \"greeter_module_plugin\",\n  \"interface\": \"universal\",\n  \"dependencies\": [],\n\n  \"nix\": {\n    \"packages\": {\n      \"build\": [],\n      \"runtime\": []\n    },\n    \"external_libraries\": [],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": []\n    }\n  }\n}\n```", "execs": [{"kind": "file", "cmd": "write greeter_module/metadata.json", "status": "pass", "note": "Wrote greeter_module/metadata.json"}]}, {"md": "### 1.2 CMakeLists.txt\n\nFor a universal module you list only your plain C++ sources; the generated glue is compiled automatically.\n\n```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(GreeterModulePlugin LANGUAGES CXX)\n\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelseif(EXISTS \"${CMAKE_CURRENT_SOURCE_DIR}/cmake/LogosModule.cmake\")\n    include(cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found\")\nendif()\n\nlogos_module(\n    NAME greeter_module\n    SOURCES\n        src/greeter_module_impl.h\n        src/greeter_module_impl.cpp\n)\n```", "execs": [{"kind": "file", "cmd": "write greeter_module/CMakeLists.txt", "status": "pass", "note": "Wrote greeter_module/CMakeLists.txt"}]}, {"md": "### 1.3 flake.nix\n\nA minimal flake that hands every input to `mkLogosModule`. The\n`` on the builder URL is pinned by the doc-test runner; the\nbuilder owns the module's `logos-cpp-sdk` pin, which we override to the\ncommit under test in the build step.\n\n```nix\n{\n  description = \"Greeter core module - a callee for the composition doc-test\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder\";\n  };\n\n  outputs = inputs@{ logos-module-builder, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n    };\n}\n```", "execs": [{"kind": "file", "cmd": "write greeter_module/flake.nix", "status": "pass", "note": "Wrote greeter_module/flake.nix"}]}, {"md": "### 1.4 src/greeter_module_impl.h \u2014 the class\n\nPlain C++ inheriting `LogosModuleContext`. The `///` doc comments\nbecome each method's description; the `logos_events:` block declares\nthe `greeted` event (the token expands to `public` under a normal\ncompile, and the generator emits the event body).\n\n```cpp\n#pragma once\n\n#include <cstdint>\n#include <string>\n\n#include <logos_module_context.h>  // LogosModuleContext base + logos_events\n\n// A simple callee module. The orchestrator composes these methods over\n// IPC. It also emits a `greeted` event so the caller can exercise a\n// typed event subscription.\nclass GreeterModuleImpl : public LogosModuleContext {\npublic:\n    GreeterModuleImpl() = default;\n    ~GreeterModuleImpl() = default;\n\n    /// Returns a greeting for the given name.\n    std::string greet(const std::string& name);\n\n    /// Adds two integers and returns the sum.\n    int64_t addInts(int64_t a, int64_t b);\n\n    /// Returns how many times greet() has been called on this instance.\n    int64_t greetCount() const;\n\n    /// Greets the name and also emits a `greeted` event carrying it.\n    void greetNotify(const std::string& name);\n\nlogos_events:\n    /// Emitted by greetNotify() with the produced greeting string.\n    void greeted(const std::string& greeting);\n\nprivate:\n    int64_t m_greetCount = 0;\n};\n```", "execs": [{"kind": "file", "cmd": "write greeter_module/src/greeter_module_impl.h", "status": "pass", "note": "Wrote greeter_module/src/greeter_module_impl.h"}]}, {"md": "### 1.5 src/greeter_module_impl.cpp \u2014 the implementation\n\nPlain C++ \u2014 no Qt, no IPC plumbing. `greetNotify` fires the generated event.\n\n```cpp\n#include \"greeter_module_impl.h\"\n\nstd::string GreeterModuleImpl::greet(const std::string& name)\n{\n    ++m_greetCount;\n    return \"Hello, \" + name + \"!\";\n}\n\nint64_t GreeterModuleImpl::addInts(int64_t a, int64_t b)\n{\n    return a + b;\n}\n\nint64_t GreeterModuleImpl::greetCount() const\n{\n    return m_greetCount;\n}\n\nvoid GreeterModuleImpl::greetNotify(const std::string& name)\n{\n    // Emit the event declared in logos_events:. When loaded by a host\n    // this reaches every subscriber; constructed outside a host it is a\n    // safe no-op.\n    greeted(\"Hello, \" + name + \"!\");\n}\n```", "execs": [{"kind": "file", "cmd": "write greeter_module/src/greeter_module_impl.cpp", "status": "pass", "note": "Wrote greeter_module/src/greeter_module_impl.cpp"}]}, {"md": "## Step 2: Create the caller: orchestrator_module\n\n`orchestrator_module` declares `greeter_module` as a dependency. That one\nline in `metadata.json` is what makes the builder run the SDK's code\ngenerator over the greeter's exported interface and emit a typed\n`modules().greeter_module` wrapper \u2014 with sync callers, async callers, and\nevent subscribers \u2014 that the orchestrator uses without any raw `LogosAPI`.", "execs": []}, {"md": "### 2.1 metadata.json \u2014 declare the dependency\n\nThe `dependencies` entry must match `greeter_module`'s own\n`metadata.json` `name`.\n\n```json\n{\n  \"name\": \"orchestrator_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"category\": \"general\",\n  \"description\": \"A caller module: composes greeter_module via typed sync/async calls and an event subscription\",\n  \"main\": \"orchestrator_module_plugin\",\n  \"interface\": \"universal\",\n  \"dependencies\": [\"greeter_module\"],\n\n  \"nix\": {\n    \"packages\": {\n      \"build\": [],\n      \"runtime\": []\n    },\n    \"external_libraries\": [],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": []\n    }\n  }\n}\n```", "execs": [{"kind": "file", "cmd": "write orchestrator_module/metadata.json", "status": "pass", "note": "Wrote orchestrator_module/metadata.json"}]}, {"md": "### 2.2 CMakeLists.txt\n\n```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(OrchestratorModulePlugin LANGUAGES CXX)\n\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelseif(EXISTS \"${CMAKE_CURRENT_SOURCE_DIR}/cmake/LogosModule.cmake\")\n    include(cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found\")\nendif()\n\nlogos_module(\n    NAME orchestrator_module\n    SOURCES\n        src/orchestrator_module_impl.h\n        src/orchestrator_module_impl.cpp\n)\n```", "execs": [{"kind": "file", "cmd": "write orchestrator_module/CMakeLists.txt", "status": "pass", "note": "Wrote orchestrator_module/CMakeLists.txt"}]}, {"md": "### 2.3 flake.nix \u2014 add the dependency input\n\nDeclare `greeter_module` as a flake input; the input name **must\nmatch** the dependency name in `metadata.json`. The `path:` value is a\nplaceholder \u2014 we lock it to the real greeter checkout in the build step\nwith `--override-input` (Nix won't accept a relative `../` path written\ndirectly into `flake.nix`).\n\n```nix\n{\n  description = \"Orchestrator core module - calls greeter_module\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder\";\n\n    # The module this one depends on. Placeholder path \u2014 locked to the\n    # real checkout in the build step via --override-input.\n    greeter_module.url = \"path:/path/to/your/greeter_module\";\n  };\n\n  outputs = inputs@{ logos-module-builder, greeter_module, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n    };\n}\n```", "execs": [{"kind": "file", "cmd": "write orchestrator_module/flake.nix", "status": "pass", "note": "Wrote orchestrator_module/flake.nix"}]}, {"md": "### 2.4 src/orchestrator_module_impl.h \u2014 the class\n\nThree composition paths, all through `modules().greeter_module`:\n`greetThrough`/`greetReport` (sync), `startAsyncGreet`/`asyncGreeting`\n(async), and `subscribeGreeted`/`lastGreetedEvent` (event).\n\n```cpp\n#pragma once\n\n#include <cstdint>\n#include <string>\n\n#include <logos_json.h>            // LogosMap\n#include <logos_module_context.h>  // LogosModuleContext base + modules()\n\n// A caller module. It does nothing on its own \u2014 it composes\n// greeter_module through the typed modules().greeter_module wrapper the\n// builder generates from the dependency declared in metadata.json.\nclass OrchestratorModuleImpl : public LogosModuleContext {\npublic:\n    OrchestratorModuleImpl() = default;\n    ~OrchestratorModuleImpl() = default;\n\n    /// Calls greeter_module.greet(name) and returns its result verbatim.\n    std::string greetThrough(const std::string& name);\n\n    /// Composes several greeter_module calls into one map: a greeting,\n    /// an integer sum, and the greeter's current greet count.\n    LogosMap greetReport(const std::string& name, int64_t a, int64_t b);\n\n    /// Fires greeter_module.greetAsync(name) asynchronously and returns\n    /// \"queued\" immediately; the reply lands in a callback. Read it back\n    /// with asyncGreeting().\n    std::string startAsyncGreet(const std::string& name);\n\n    /// The greeting delivered by startAsyncGreet()'s callback, or empty\n    /// until it arrives.\n    std::string asyncGreeting() const;\n\n    /// Subscribes to greeter_module's `greeted` event with a typed\n    /// callback. Returns \"ok\" once registered.\n    std::string subscribeGreeted();\n\n    /// The last greeting captured by the `greeted` subscription, or\n    /// empty until the event fires.\n    std::string lastGreetedEvent() const;\n\nprivate:\n    std::string m_asyncGreeting;\n    std::string m_lastGreetedEvent;\n    bool        m_subscribed = false;\n};\n```", "execs": [{"kind": "file", "cmd": "write orchestrator_module/src/orchestrator_module_impl.h", "status": "pass", "note": "Wrote orchestrator_module/src/orchestrator_module_impl.h"}]}, {"md": "### 2.5 src/orchestrator_module_impl.cpp \u2014 the implementation\n\nThe `.cpp` includes the generated `logos_sdk.h` (which defines\n`LogosModules`) \u2014 that's why the cross-module calls live here and not in\nthe header the generator parses. Each method drives `greeter_module`\nthrough the generated wrapper: `.greet(...)` (sync), `.greetAsync(...,\ncb)` (async), `.onGreeted(cb)` (event).\n\n```cpp\n#include \"orchestrator_module_impl.h\"\n\n// Generated at build time by logos-cpp-generator. Defines LogosModules\n// with one std-typed accessor per metadata.json dependency \u2014 here\n// greeter_module. Included only in the .cpp so the impl header the\n// generator parses stays free of Qt and codegen types.\n#include \"logos_sdk.h\"\n\nstd::string OrchestratorModuleImpl::greetThrough(const std::string& name)\n{\n    // The simplest cross-module round-trip: one typed sync call.\n    return modules().greeter_module.greet(name);\n}\n\nLogosMap OrchestratorModuleImpl::greetReport(const std::string& name,\n                                             int64_t a, int64_t b)\n{\n    // Three typed sync calls into greeter_module, composed into one map.\n    auto& greeter = modules().greeter_module;\n    LogosMap report;\n    report[\"greeting\"]   = greeter.greet(name);\n    report[\"sum\"]        = greeter.addInts(a, b);\n    report[\"greetCount\"] = greeter.greetCount();\n    return report;\n}\n\nstd::string OrchestratorModuleImpl::startAsyncGreet(const std::string& name)\n{\n    // The generated async overload returns immediately; the reply is\n    // delivered to the callback on this module's event loop.\n    modules().greeter_module.greetAsync(name, [this](const std::string& g) {\n        m_asyncGreeting = g;\n    });\n    return \"queued\";\n}\n\nstd::string OrchestratorModuleImpl::asyncGreeting() const\n{\n    return m_asyncGreeting;\n}\n\nstd::string OrchestratorModuleImpl::subscribeGreeted()\n{\n    if (m_subscribed) return \"ok\";\n    // Typed subscriber generated from greeter_module's logos_events:\n    // greeted(const std::string&). The accessor is `on` + the\n    // capitalized event name.\n    m_subscribed = modules().greeter_module.onGreeted(\n        [this](const std::string& greeting) {\n            m_lastGreetedEvent = greeting;\n        });\n    return m_subscribed ? \"ok\" : \"failed\";\n}\n\nstd::string OrchestratorModuleImpl::lastGreetedEvent() const\n{\n    return m_lastGreetedEvent;\n}\n```", "execs": [{"kind": "file", "cmd": "write orchestrator_module/src/orchestrator_module_impl.cpp", "status": "pass", "note": "Wrote orchestrator_module/src/orchestrator_module_impl.cpp"}]}, {"md": "## Step 3: Build both modules against this SDK\n\nNix flakes only see files tracked by git, so initialise a repo in each\nmodule first. Then build each module's `.lgx`, overriding `logos-cpp-sdk`\nto the commit under test so the generated wrappers, plugin glue, and IPC\ncome from this SDK.\n\n> Each override URL carries a `` placeholder the doc-test runner\n> expands to a concrete ref: locally that is this `logos-cpp-sdk`\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested.\n> With no pin it falls back to latest `master`.", "execs": []}, {"md": "### 3.1 Initialise git repos\n\nThe greeter is a dependency of the orchestrator, so both must be tracked.\n\n```bash\n(cd greeter_module && git init -q && git add -A)\n(cd orchestrator_module && git init -q && git add -A)\n\n```", "execs": [{"kind": "run", "cmd": "(cd greeter_module && git init -q && git add -A)\n(cd orchestrator_module && git init -q && git add -A)\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Build the greeter's .lgx against this SDK\n\nThe greeter has no module dependency, so only its builder's\n`logos-cpp-sdk` needs overriding.\n\n```bash\n# From inside the greeter clone this is simply:\n#   nix build '.#lgx' --override-input logos-module-builder/logos-cpp-sdk 'github:logos-co/logos-cpp-sdk'\nnix build 'path:./greeter_module#lgx' \\\n  --override-input logos-module-builder/logos-cpp-sdk 'github:logos-co/logos-cpp-sdk' \\\n  -o greeter-lgx\n```\n\nThe greeter package is under `./greeter-lgx/`:\n\n```bash\nls greeter-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "nix build 'path:./greeter_module#lgx' \\\n  --override-input logos-module-builder/logos-cpp-sdk 'github:logos-co/logos-cpp-sdk/99eb4a7dd78f86720f48f7e6954d779f2267fca9' \\\n  -o greeter-lgx\n", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-module-builder/c975aa5b1d79402b701a5e8483d286127fd7fbb3' into the Git cache...\nunpacking 'github:logos-co/logos-module/780894dd40ebc8eded0fa97b1729286f31571cfb?narHash=sha256-CV7R%2BlwNIP0baXZtE9uNjqu7qDLiANwyGfMkHfTjcl0%3D' into the Git cache...\nunpacking 'github:logos-co/logos-standalone-app/f812b43f73f3c264ee0f8a8354f40721431d6846?narHash=sha ogos-module-client/logos-cpp-sdk':\n    'github:logos-co/logos-cpp-sdk/25c88f4' (2026-05-07)\n  \u2192 'github:logos-co/logos-cpp-sdk/99eb4a7' (2026-06-05)\n", "note": ""}]}, {"md": "### 4.2 Build lgpm\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' -o lgpm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Seed the modules directory with the capability module\n\nLoading a module goes through the host's capability layer, so the\nmodules directory needs the `capability_module` that ships with\n`logoscore` (rebuilt against this SDK). Copy it across first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.4 Install the greeter\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file greeter-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file greeter-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: greeter-lgx/logos-greeter_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 4.5 Install the orchestrator\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file orchestrator-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file orchestrator-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: orchestrator-lgx/logos-orchestrator_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 4.6 Confirm both modules are installed\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 3 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \ngreeter_module                 1.0.0           core       general        \norchestrator_module            1.0.0           core       general        \n", "note": ""}]}, {"md": "## Step 5: Load both modules and drive the caller\n\nStart `logoscore` in daemon mode (`-D`) \u2014 it keeps each module's process\nalive between `call` commands, so an event subscription registered by one\ncall is still active when a later call triggers it, and an async reply\nlands before the call that reads it. Load **both** modules, then call the\norchestrator's methods \u2014 each one reaches across the process boundary into\nthe greeter.", "execs": []}, {"md": "### 5.1 Start the daemon\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.2 Load the greeter (the dependency first)\n\n```bash\nlogoscore load-module greeter_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module greeter_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"greeter_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.3 Load the orchestrator\n\n```bash\nlogoscore load-module orchestrator_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module orchestrator_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"orchestrator_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.4 Confirm both report loaded\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":21481,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"orchestrator_module\",\"status\":\"loaded\"},{\"name\":\"greeter_module\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":3,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 5.5 Synchronous cross-module call\n\n`greetThrough(name)` forwards straight to `greeter_module.greet(name)`\nand returns the result \u2014 one typed sync call across the process\nboundary:\n\n```bash\nlogoscore call orchestrator_module greetThrough World\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module greetThrough World", "status": "pass", "exit_code": 0, "output": "{\"method\":\"greetThrough\",\"module\":\"orchestrator_module\",\"result\":\"Hello, World!\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.6 Compose several calls into one result\n\n`greetReport(name, a, b)` fans out to three greeter calls \u2014 `greet`,\n`addInts`, and `greetCount` \u2014 and returns them as one map. The greeter\nhas now been greeted twice (once above, once here), so `greetCount` is\n`2`:\n\n```bash\nlogoscore call orchestrator_module greetReport Logos 3 5\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module greetReport Logos 3 5", "status": "pass", "exit_code": 0, "output": "{\"method\":\"greetReport\",\"module\":\"orchestrator_module\",\"result\":{\"greetCount\":2,\"greeting\":\"Hello, Logos!\",\"sum\":8},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.7 Asynchronous cross-module call\n\n`startAsyncGreet(name)` fires `greeter_module.greetAsync(name)` and\nreturns `\"queued\"` immediately. The reply arrives on the daemon's event\nloop; the next call, `asyncGreeting()`, reads what the callback stashed:\n\n```bash\nlogoscore call orchestrator_module startAsyncGreet Async\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module startAsyncGreet Async", "status": "pass", "exit_code": 0, "output": "{\"method\":\"startAsyncGreet\",\"module\":\"orchestrator_module\",\"result\":\"queued\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 1\n```", "execs": [{"kind": "run", "cmd": "sleep 1", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.8 Read the async reply\n\n```bash\nlogoscore call orchestrator_module asyncGreeting\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module asyncGreeting", "status": "pass", "exit_code": 0, "output": "{\"method\":\"asyncGreeting\",\"module\":\"orchestrator_module\",\"result\":\"Hello, Async!\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.9 Subscribe to the greeter's event\n\n`subscribeGreeted()` registers a typed callback on `greeter_module`'s\n`greeted` event. Then `greeter_module.greetNotify(...)` makes the\ngreeter emit it, and `lastGreetedEvent()` reads what the subscription\ncaptured. Because the daemon keeps both modules loaded, the event fires\nbetween the calls:\n\n```bash\nlogoscore call orchestrator_module subscribeGreeted\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module subscribeGreeted", "status": "pass", "exit_code": 0, "output": "{\"method\":\"subscribeGreeted\",\"module\":\"orchestrator_module\",\"result\":\"ok\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.10 Trigger the event from the greeter\n\n```bash\nlogoscore call greeter_module greetNotify Events\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call greeter_module greetNotify Events", "status": "pass", "exit_code": 0, "output": "{\"method\":\"greetNotify\",\"module\":\"greeter_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 1\n```", "execs": [{"kind": "run", "cmd": "sleep 1", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.11 Read the captured event payload\n\n```bash\nlogoscore call orchestrator_module lastGreetedEvent\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module lastGreetedEvent", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lastGreetedEvent\",\"module\":\"orchestrator_module\",\"result\":\"Hello, Events!\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.12 Stop the daemon\n\n```bash\nlogoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.13 Confirm the daemon has stopped\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"dffa819aa0d0\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "## Recap\n\n| Composition path | In the orchestrator | Driven via `logoscore` |\n| ---------------- | ------------------- | ---------------------- |\n| Typed **sync** call | `greetThrough()` \u2192 `greeter.greet(...)` | `\"Hello, World!\"` |\n| Composed sync calls | `greetReport()` \u2192 `greet` + `addInts` + `greetCount` | one map of three results |\n| Typed **async** call | `startAsyncGreet()` \u2192 `greetAsync(..., cb)` | `queued`, then `\"Hello, Async!\"` |\n| Typed **event** subscription | `subscribeGreeted()` \u2192 `onGreeted(cb)` | captured `\"Hello, Events!\"` |\n\nEvery path went through `modules().greeter_module`, the wrapper the SDK's\ncode generator emitted from the `greeter_module` dependency \u2014 and both\nmodules, the wrapper, and the runtime were built against the SDK commit\nunder test. A green run means inter-module composition still works on this\nSDK, end to end.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
